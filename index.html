<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashoka Hotel & Restaurant | Premium Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* === VARIABLES & THEMING === */
        :root {
            --gold-main: #c9a84c;
            --gold-light: #e8c87a;
            --gold-dark: #9a7730;
            --bg-dark: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --glass-bg: rgba(25, 25, 25, 0.6);
            --glass-border: rgba(201, 168, 76, 0.2);
            --nav-bg: rgba(10, 10, 10, 0.9);
            --danger: #e74c3c;
            --veg: #2ecc71;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Josefin Sans', sans-serif;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg-dark: #f8f9fa;
            --text-main: #111111;
            --text-muted: #555555;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(201, 168, 76, 0.4);
            --nav-bg: rgba(248, 249, 250, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            transition: var(--transition);
        }

        /* === NAVBAR === */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--gold-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            background: none;
            border: 1px solid var(--gold-main);
            color: var(--gold-main);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--gold-main);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.4);
        }

        .search-container {
            position: relative;
        }

        .search-input {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 20px;
            font-family: var(--font-body);
            outline: none;
            width: 200px;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--gold-main);
            box-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
        }

        /* === CATEGORY TABS === */
        .category-tabs {
            position: fixed;
            top: 70px;
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            padding: 10px 5%;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 999;
            scrollbar-width: none;
            border-bottom: 1px solid var(--glass-border);
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-heading);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            position: relative;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--gold-main);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gold-main);
            box-shadow: 0 0 8px var(--gold-main);
        }

        /* === MAIN CONTENT === */
        main {
            padding: 140px 5% 100px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .category-section {
            margin-bottom: 60px;
            scroll-margin-top: 140px;
        }

        .category-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--gold-main);
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
        }

        .category-title::after {
            content: '❖';
            display: block;
            font-size: 1.2rem;
            color: var(--gold-dark);
            margin-top: 5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        /* === MENU CARD (GLASSMORPHISM) === */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(201, 168, 76, 0.15);
            border-color: var(--gold-main);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .item-name-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .veg-indicator {
            width: 14px;
            height: 14px;
            border: 1px solid var(--veg);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 2px;
        }
        .veg-indicator::after {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--veg);
            border-radius: 50%;
        }

        .item-name {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .item-price {
            color: var(--gold-main);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .item-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.4;
            flex-grow: 1;
        }

        .dual-price-select {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--gold-main);
            padding: 5px;
            border-radius: 4px;
            font-family: var(--font-body);
            margin-bottom: 15px;
            width: 100%;
            outline: none;
        }
        .dual-price-select option {
            background: var(--bg-dark);
            color: var(--text-main);
        }

        .item-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 5px 10px;
            border: 1px solid var(--glass-border);
        }

        .qty-btn {
            background: none;
            border: none;
            color: var(--gold-main);
            font-size: 1.2rem;
            cursor: pointer;
            width: 25px;
            height: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: var(--transition);
        }

        .qty-btn:hover {
            background: var(--gold-main);
            color: var(--bg-dark);
        }

        .qty-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 30px;
            text-align: center;
            font-family: var(--font-body);
            font-weight: 600;
        }

        .add-btn {
            background: var(--gold-main);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: var(--font-body);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-btn:hover {
            background: var(--gold-light);
            box-shadow: 0 0 15px rgba(201, 168, 76, 0.5);
        }

        /* === CART SYSTEM === */
        .cart-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--gold-main);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(201, 168, 76, 0.4);
            z-index: 1000;
            transition: var(--transition);
        }

        .cart-fab:hover {
            transform: scale(1.05);
            background: var(--gold-light);
        }

        .cart-fab svg {
            width: 28px;
            height: 28px;
            fill: #000;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: bold;
            border: 2px solid var(--bg-dark);
        }

        .cart-panel {
            position: fixed;
            top: 0;
            right: -450px;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--glass-border);
            z-index: 1001;
            padding: 30px;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .cart-panel.active {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cart-title {
            font-family: var(--font-heading);
            color: var(--gold-main);
            font-size: 2rem;
        }

        .close-cart {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-cart:hover {
            color: var(--danger);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }
        .cart-items::-webkit-scrollbar { width: 5px; }
        .cart-items::-webkit-scrollbar-thumb { background: var(--gold-main); border-radius: 5px; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px dashed var(--glass-border);
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .cart-item-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--gold-main);
            font-size: 0.9rem;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 5px;
            text-decoration: underline;
        }

        .cart-footer {
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
            margin-top: 20px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--gold-main);
            margin-bottom: 20px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--gold-main);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: var(--font-body);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkout-btn:hover {
            background: var(--gold-light);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
        }

        /* === MODAL === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-title {
            font-family: var(--font-heading);
            color: var(--gold-main);
            font-size: 2.2rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 6px;
            font-family: var(--font-body);
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--gold-main);
        }

        .order-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .whatsapp-btn, .email-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: #fff;
        }
        .whatsapp-btn:hover { background: #20bd5a; box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); }

        .email-btn {
            background: transparent;
            color: var(--gold-main);
            border: 1px solid var(--gold-main);
        }
        .email-btn:hover { background: var(--gold-main); color: #000; }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; padding: 15px; }
            .search-input { width: 100%; }
            .category-tabs { top: 120px; }
            main { padding-top: 190px; }
            .cart-panel { width: 100%; max-width: 100%; right: -100%; }
            .cart-fab { bottom: 20px; right: 20px; }
        }
    </style>
</head>

        // === PARSER & STATE ===
        const menuData = {};
        let currentCat = "";
        
        rawData.split('\n').forEach(line => {
            line = line.trim();
            if (!line) return;
            
            if (!line.includes('-')) {
                currentCat = line;
                menuData[currentCat] = [];
            } else {
                const parts = line.split('-');
                const price = parts.pop().trim();
                const name = parts.join('-').trim();
                menuData[currentCat].push({ name, price, category: currentCat });
            }
        });

        let cart = [];

        // === AUTO DESCRIPTION GENERATOR ===
        function getPremiumDesc(name, category) {
            const lName = name.toLowerCase();
            const lCat = category.toLowerCase();
            if(lName.includes('paneer')) return "Succulent premium cottage cheese crafted with authentic spices and rich herbs.";
            if(lCat.includes('soup')) return "A warm, comforting bowl prepared with the finest ingredients and balanced flavors.";
            if(lCat.includes('pizza') || lCat.includes('pasta')) return "Classic Italian flavors with a touch of modern culinary excellence.";
            if(lCat.includes('tandoor') || lName.includes('tikka') || lName.includes('chaap')) return "Marinated in exquisite spices and slow-roasted to smoky perfection in our traditional clay oven.";
            if(lCat.includes('dessert')) return "A decadent, sweet conclusion to elevate your dining experience.";
            if(lCat.includes('bread')) return "Freshly baked Indian breads, soft and aromatic, straight from the tandoor.";
            if(lCat.includes('rice') || lCat.includes('biryani')) return "Fragrant, long-grain premium basmati cooked flawlessly with aromatic whole spices.";
            if(lCat.includes('chinese') || lCat.includes('noodle')) return "Authentic pan-Asian flavors tossed with fresh vegetables and signature sauces.";
            return "Prepared fresh with hand-picked ingredients for a truly luxurious taste.";
        }

        // === RENDER MENU ===
        function renderMenu() {
            const tabsContainer = document.getElementById('category-tabs');
            const menuContainer = document.getElementById('menu-container');
            
            tabsContainer.innerHTML = '';
            menuContainer.innerHTML = '';

            Object.keys(menuData).forEach((cat, index) => {
                // Generate Tab
                const tabId = cat.replace(/\s+/g, '-').toLowerCase();
                tabsContainer.innerHTML += `<button class="tab-btn ${index === 0 ? 'active' : ''}" onclick="scrollToCat('${tabId}')">${cat}</button>`;

                // Generate Section
                let sectionHTML = `
                    <div id="${tabId}" class="category-section">
                        <h2 class="category-title">${cat}</h2>
                        <div class="menu-grid">
                `;

                menuData[cat].forEach((item, itemIdx) => {
                    const itemId = `${tabId}-${itemIdx}`;
                    const desc = getPremiumDesc(item.name, cat);
                    
                    // Handle dual prices (e.g., 250 / 150)
                    let priceDisplay = '';
                    let isDual = item.price.includes('/');
                    
                    if(isDual) {
                        const prices = item.price.split('/').map(p => p.trim());
                        priceDisplay = `
                            <select class="dual-price-select" id="price-${itemId}">
                                <option value="${prices[0]}">Full - ₹${prices[0]}</option>
                                <option value="${prices[1]}">Half - ₹${prices[1]}</option>
                            </select>
                        `;
                    } else {
                        priceDisplay = `<div class="item-price">₹${item.price === '00' ? '0' : item.price}</div>`;
                    }

                    sectionHTML += `
                        <div class="glass-card menu-item-card" data-name="${item.name.toLowerCase()}">
                            <div>
                                <div class="item-header">
                                    <div class="item-name-box">
                                        <div class="veg-indicator" title="Vegetarian"></div>
                                        <div class="item-name">${item.name}</div>
                                    </div>
                                    ${!isDual ? priceDisplay : ''}
                                </div>
                                <div class="item-desc">${desc}</div>
                                ${isDual ? priceDisplay : ''}
                            </div>
                            <div class="item-actions">
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty('${itemId}', -1)">-</button>
                                    <input type="text" class="qty-input" id="qty-${itemId}" value="1" readonly>
                                    <button class="qty-btn" onclick="updateQty('${itemId}', 1)">+</button>
                                </div>
                                <button class="add-btn" onclick="addToCart('${item.name}', '${itemId}', ${isDual})">Add to Order</button>
                            </div>
                        </div>
                    `;
                });

                sectionHTML += `</div></div>`;
                menuContainer.innerHTML += sectionHTML;
            });
        }

        // === UI INTERACTIONS ===
        function scrollToCat(id) {
            document.getElementById(id).scrollIntoView();
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function updateQty(id, change) {
            const input = document.getElementById(`qty-${id}`);
            let val = parseInt(input.value) + change;
            if (val < 1) val = 1;
            input.value = val;
        }

        function filterMenu() {
            const q = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.menu-item-card').forEach(card => {
                const name = card.getAttribute('data-name');
                if(name.includes(q)) card.style.display = 'flex';
                else card.style.display = 'none';
            });
        }

        function toggleTheme() {
            const body = document.documentElement;
            const current = body.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', target);
            localStorage.setItem('ashoka_theme', target);
        }

        // === CART LOGIC ===
        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('active');
        }

        function addToCart(name, elId, isDual) {
            const qty = parseInt(document.getElementById(`qty-${elId}`).value);
            let priceRaw = '';
            let variantStr = '';

            if(isDual) {
                const select = document.getElementById(`price-${elId}`);
                priceRaw = select.value;
                variantStr = select.options[select.selectedIndex].text.split('-')[0].trim();
                name = `${name} (${variantStr})`;
            } else {
                // Find original price from raw
                for(let cat in menuData) {
                    let found = menuData[cat].find(i => i.name === name);
                    if(found) priceRaw = found.price;
                }
            }

            const priceNum = parseInt(priceRaw) || 0;

            const existing = cart.find(i => i.name === name);
            if(existing) {
                existing.qty += qty;
            } else {
                cart.push({ name, price: priceNum, qty });
            }

            // Reset UI qty
            document.getElementById(`qty-${elId}`).value = 1;
            updateCartUI();
            
            // Visual feedback
            const fab = document.querySelector('.cart-fab');
            fab.style.transform = 'scale(1.2)';
            setTimeout(() => fab.style.transform = '', 200);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const countBadge = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total-price');
            
            container.innerHTML = '';
            let totalQty = 0;
            let totalPrice = 0;

            if(cart.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); text-align:center; margin-top:20px;">Your cart is empty.</p>';
            }

            cart.forEach((item, index) => {
                totalQty += item.qty;
                const itemTotal = item.qty * item.price;
                totalPrice += itemTotal;

                container.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.qty}x ${item.name}</div>
                            <div class="cart-item-price">₹${item.price} each</div>
                            <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                        </div>
                        <div style="font-weight:bold;">₹${itemTotal}</div>
                    </div>
                `;
            });

            countBadge.innerText = totalQty;
            totalEl.innerText = `₹${totalPrice}`;
        }

        // === CHECKOUT & MESSAGING ===
        function openCheckoutModal() {
            if(cart.length === 0) {
                alert("Please add items to your order first.");
                return;
            }
            document.getElementById('checkout-modal').classList.add('active');
            toggleCart();
        }

        function closeCheckoutModal() {
            document.getElementById('checkout-modal').classList.remove('active');
        }

        function submitOrder(method) {
            const name = document.getElementById('cust-name').value.trim();
            const table = document.getElementById('cust-table').value.trim();
            
            if(!name || !table) {
                alert("Please enter your Name and Table/Room number.");
                return;
            }

            let totalPrice = cart.reduce((sum, item) => sum + (item.qty * item.price), 0);
            
            let msg = `*Hello, I want to order from Ashoka Hotel:*\n\n`;
            msg += `*Name:* ${name}\n`;
            msg += `*Table / Room No:* ${table}\n\n`;
            msg += `*Order Details:*\n`;
            
            cart.forEach(item => {
                msg += `▪ ${item.qty}x ${item.name} - ₹${item.qty * item.price}\n`;
            });
            
            msg += `\n*Total Amount:* ₹${totalPrice}`;

            const encodedMsg = encodeURIComponent(msg);

            if(method === 'whatsapp') {
                window.open(`https://wa.me/918818004499?text=${encodedMsg}`, '_blank');
            } else if (method === 'email') {
                window.location.href = `mailto:ashokahoteljind@gmail.com?subject=New Food Order - Table/Room ${table}&body=${encodedMsg}`;
            }

            closeCheckoutModal();
        }

        // === INIT ===
        window.onload = () => {
            // Check Theme
            const savedTheme = localStorage.getItem('ashoka_theme');
            if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
            
            renderMenu();
            updateCartUI();
        };
    </script>
